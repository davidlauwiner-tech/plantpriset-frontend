<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Växt – Plantpriset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F7F4EF; --dark: #1C1C1A; --green: #3D6B4F;
      --green-light: #C8DDD0; --warm-gray: #8C8880; --border: #E2DDD7; --white: #ffffff;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 3rem; border-bottom: 1px solid var(--border);
      background: rgba(247,244,239,0.95); backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: var(--dark); text-decoration: none; letter-spacing: -0.02em; }
    .logo span { color: var(--green); }
    nav ul { list-style: none; display: flex; gap: 2rem; align-items: center; }
    nav ul a { text-decoration: none; font-size: 0.875rem; color: var(--warm-gray); transition: color 0.2s; }
    nav ul a:hover { color: var(--dark); }
    .nav-cta { background: var(--green) !important; color: #fff !important; padding: 0.5rem 1.1rem; border-radius: 2rem; }

    .breadcrumb { padding: 0.75rem 3rem; font-size: 0.78rem; color: var(--warm-gray); border-bottom: 1px solid var(--border); }
    .breadcrumb a { color: var(--warm-gray); text-decoration: none; }
    .breadcrumb a:hover { color: var(--dark); }
    .breadcrumb span { margin: 0 0.4rem; }

    /* HERO SECTION */
    .plant-hero {
      display: grid; grid-template-columns: 320px 1fr;
      max-width: 1100px; margin: 0 auto; padding: 3rem 3rem 0; gap: 3rem;
    }

    .plant-visual {
      background: linear-gradient(145deg, var(--green-light), #deeae3);
      border-radius: 16px; border: 1px solid var(--border);
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 6rem; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .plant-visual::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 60%);
    }

    .plant-info { padding-top: 0.5rem; }

    .type-badge { display: inline-block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); background: var(--green-light); padding: 0.25rem 0.65rem; border-radius: 2rem; margin-bottom: 1rem; }

    .plant-name { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 0.35rem; }

    .plant-latin { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-style: italic; color: var(--warm-gray); margin-bottom: 1.5rem; }

    /* PRICE HIGHLIGHT */
    .price-highlight {
      display: flex; align-items: baseline; gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .price-from-label { font-size: 0.85rem; color: var(--warm-gray); }
    .price-big { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 600; color: var(--green); }
    .price-no-listings { font-size: 0.9rem; color: var(--warm-gray); font-style: italic; }

    /* ATTR GRID */
    .attr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.65rem; margin-bottom: 1.75rem; }
    .attr-item { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; }
    .attr-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 0.2rem; }
    .attr-value { font-size: 0.9rem; font-weight: 500; color: var(--dark); }

    /* DESCRIPTION */
    .plant-desc {
      font-size: 0.9rem; line-height: 1.65; color: var(--warm-gray); font-weight: 300;
      background: var(--white); border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.25rem; margin-bottom: 1.75rem;
    }

    /* CTA */
    .cta-row { display: flex; gap: 0.75rem; }
    .btn-primary {
      flex: 1; padding: 0.85rem 1.5rem; background: var(--green); color: #fff;
      border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
      text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-primary:hover { background: #2d5440; }
    .btn-secondary {
      padding: 0.85rem 1.25rem; background: var(--white); color: var(--dark);
      border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; cursor: pointer; transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--dark); }

    /* PRICE TABLE */
    .content-section { max-width: 1100px; margin: 3rem auto 0; padding: 0 3rem; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 1.25rem; }

    .price-table { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .pt-header { display: grid; grid-template-columns: 1fr auto auto auto; gap: 1rem; padding: 0.75rem 1.5rem; background: var(--cream); border-bottom: 1px solid var(--border); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warm-gray); }
    .pt-row {
      display: grid; grid-template-columns: 1fr auto auto auto; gap: 1rem;
      padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
      align-items: center; transition: background 0.15s;
    }
    .pt-row:last-child { border-bottom: none; }
    .pt-row:hover { background: #faf9f7; }
    .pt-row.best { background: #f0f8f4; }
    .retailer-name { font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
    .best-badge { font-size: 0.65rem; font-weight: 500; background: var(--green); color: #fff; padding: 0.15rem 0.5rem; border-radius: 2rem; letter-spacing: 0.04em; }
    .pt-qty { font-size: 0.82rem; color: var(--warm-gray); text-align: right; }
    .pt-price { font-size: 1.05rem; font-weight: 600; color: var(--dark); text-align: right; min-width: 80px; }
    .pt-row.best .pt-price { color: var(--green); }
    .pt-btn {
      background: var(--green); color: #fff; border: none; border-radius: 6px;
      padding: 0.45rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      font-weight: 500; cursor: pointer; text-decoration: none; display: inline-block;
      transition: background 0.15s; white-space: nowrap;
    }
    .pt-btn:hover { background: #2d5440; }
    .pt-btn.out { background: var(--border); color: var(--warm-gray); cursor: default; }

    .no-listings { padding: 2.5rem; text-align: center; color: var(--warm-gray); }
    .no-listings .nl-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .no-listings p { font-size: 0.875rem; }

    /* RELATED */
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.85rem; }
    .related-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; text-decoration: none; color: inherit; display: block;
      transition: border-color 0.2s, transform 0.15s;
    }
    .related-card:hover { border-color: var(--green); transform: translateY(-1px); }
    .rc-img { height: 80px; background: linear-gradient(135deg, var(--green-light), #deeae3); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
    .rc-body { padding: 0.75rem; }
    .rc-name { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.15rem; }
    .rc-latin { font-size: 0.7rem; font-style: italic; color: var(--warm-gray); }

    footer { border-top: 1px solid var(--border); padding: 2rem 3rem; margin-top: 4rem; display: flex; justify-content: space-between; }
    footer p { font-size: 0.78rem; color: var(--warm-gray); }
    footer a { color: var(--warm-gray); text-decoration: none; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fadein { animation: fadeUp 0.3s ease forwards; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-hero { display: flex; align-items: center; justify-content: center; min-height: 40vh; color: var(--warm-gray); gap: 0.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Plant<span>priset</span></a>
  <ul>
    <li><a href="vaxter.html">Växter</a></li>
    <li><a href="vaxter.html?type=seed">Frön</a></li>
    <li><a href="vaxter.html?type=tool">Verktyg</a></li>
    <li><a href="index.html" class="nav-cta">Hem</a></li>
  </ul>
</nav>

<div class="breadcrumb" id="breadcrumb">
  <a href="index.html">Hem</a><span>›</span><a href="vaxter.html">Växter</a><span>›</span><span id="bcName">Laddar…</span>
</div>

<div id="pageContent">
  <div class="loading-hero"><span class="spinner"></span> Hämtar växtinfo…</div>
</div>

<script>
  const API = 'https://web-production-cc863.up.railway.app';
  const typeEmoji = { perennial:'🌸', shrub:'🌿', tree:'🌳', bulb:'🧅', seed:'🌱', grass:'🎋', annual:'🌻', tool:'🔧', vegetable:'🥕', herb:'🌿' };
  const typeLabel = { perennial:'Perenn', shrub:'Buske', tree:'Träd', bulb:'Lök', seed:'Frö', grass:'Gräs', annual:'Annuell', tool:'Verktyg', vegetable:'Grönsak', herb:'Ört' };

  function sunLabel(s) {
    if (!s) return null;
    if (s.includes('part')) return '⛅ Halvskugga';
    if (s.includes('shade')) return '🌥️ Skugga';
    if (s.includes('sun')) return '☀️ Full sol';
    return s;
  }

  async function load() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) { window.location = 'vaxter.html'; return; }

    try {
      const r = await fetch(`${API}/plants/${slug}`);
      if (!r.ok) { window.location = 'vaxter.html'; return; }
      const plant = await r.json();

      document.title = `${plant.common_name_sv || plant.slug} – Plantpriset`;
      document.getElementById('bcName').textContent = plant.common_name_sv || plant.slug;

      // Update breadcrumb with type filter link
      if (plant.plant_type) {
        document.getElementById('breadcrumb').innerHTML = `
          <a href="index.html">Hem</a><span>›</span>
          <a href="vaxter.html">Växter</a><span>›</span>
          <a href="vaxter.html?type=${plant.plant_type}">${typeLabel[plant.plant_type]||plant.plant_type}r</a><span>›</span>
          <span>${plant.common_name_sv||plant.slug}</span>
        `;
      }

      const listings = plant.listings || [];
      const lowestPrice = listings.length ? Math.min(...listings.map(l => parseFloat(l.price_sek)||9999)) : null;
      const bestListing = listings.find(l => parseFloat(l.price_sek) === lowestPrice);

      document.getElementById('pageContent').innerHTML = `
        <div class="plant-hero fadein">
          <div class="plant-visual">${typeEmoji[plant.plant_type] || '🌿'}</div>
          <div class="plant-info">
            ${plant.plant_type ? `<div class="type-badge">${typeLabel[plant.plant_type]||plant.plant_type}</div>` : ''}
            <h1 class="plant-name">${plant.common_name_sv || plant.slug}</h1>
            ${plant.latin_name ? `<div class="plant-latin">${plant.latin_name}</div>` : ''}

            ${lowestPrice
              ? `<div class="price-highlight">
                  <span class="price-from-label">Bästa pris från</span>
                  <span class="price-big">${Number(lowestPrice).toFixed(0)} kr</span>
                  ${bestListing ? `<span style="font-size:0.78rem;color:var(--warm-gray)">hos ${bestListing.retailer_name||'butiken'}</span>` : ''}
                </div>`
              : `<div class="price-highlight"><span class="price-no-listings">Inga priser tillgängliga ännu</span></div>`
            }

            <div class="attr-grid">
              ${plant.sun_req ? `<div class="attr-item"><div class="attr-label">Sol & skugga</div><div class="attr-value">${sunLabel(plant.sun_req)||plant.sun_req}</div></div>` : ''}
              ${plant.hardiness_zone ? `<div class="attr-item"><div class="attr-label">Härdighetszon</div><div class="attr-value">Zon ${plant.hardiness_zone}</div></div>` : ''}
              ${(plant.height_cm_min || plant.height_cm_max) ? `<div class="attr-item"><div class="attr-label">Höjd</div><div class="attr-value">${plant.height_cm_min && plant.height_cm_max ? `${plant.height_cm_min}–${plant.height_cm_max} cm` : `${plant.height_cm_max||plant.height_cm_min} cm`}</div></div>` : ''}
              ${plant.bloom_months ? `<div class="attr-item"><div class="attr-label">Blomningstid</div><div class="attr-value">${plant.bloom_months}</div></div>` : ''}
            </div>

            ${plant.description_sv ? `<div class="plant-desc">${plant.description_sv}</div>` : ''}

            <div class="cta-row">
              ${lowestPrice && bestListing && bestListing.product_url
                ? `<a href="${bestListing.product_url}" target="_blank" class="btn-primary">Köp hos ${bestListing.retailer_name||'butiken'} →</a>`
                : `<button class="btn-primary" onclick="document.getElementById('priceTable').scrollIntoView({behavior:'smooth'})">Se alla priser ↓</button>`
              }
              <button class="btn-secondary" onclick="window.history.back()">← Tillbaka</button>
            </div>
          </div>
        </div>

        <div class="content-section" id="priceTable" style="margin-top:3rem">
          <h2 class="section-title">Priser från svenska butiker</h2>
          ${renderPriceTable(listings)}
        </div>

        <div class="content-section" style="margin-top:3rem; margin-bottom:4rem">
          <h2 class="section-title">Liknande växter</h2>
          <div class="related-grid" id="relatedGrid">
            <div style="color:var(--warm-gray);font-size:0.85rem;grid-column:1/-1"><span class="spinner"></span> Laddar…</div>
          </div>
        </div>
      `;

      // Load related
      loadRelated(plant);

    } catch(e) {
      document.getElementById('pageContent').innerHTML = `<div style="text-align:center;padding:4rem;color:var(--warm-gray)">Kunde inte ladda växt. <a href="vaxter.html" style="color:var(--green)">Gå tillbaka</a></div>`;
    }
  }

  function renderPriceTable(listings) {
    if (!listings || !listings.length) {
      return `<div class="price-table"><div class="no-listings"><div class="nl-icon">🌱</div><p>Inga priser registrerade ännu.<br>Vi arbetar på att lägga till fler butiker.</p></div></div>`;
    }

    const sorted = [...listings].sort((a,b) => parseFloat(a.price_sek||9999) - parseFloat(b.price_sek||9999));
    const best = sorted[0];

    return `<div class="price-table">
      <div class="pt-header">
        <span>Butik</span><span>Antal</span><span>Pris</span><span></span>
      </div>
      ${sorted.map((l,i) => `
        <div class="pt-row ${i===0?'best':''}">
          <div class="retailer-name">
            ${l.retailer_name || 'Okänd butik'}
            ${i===0 ? '<span class="best-badge">Bästa pris</span>' : ''}
          </div>
          <div class="pt-qty">${l.quantity ? `${l.quantity} st` : '–'}</div>
          <div class="pt-price">${l.price_sek ? `${Number(l.price_sek).toFixed(0)} kr` : '–'}</div>
          <div>
            ${l.product_url && l.in_stock !== false
              ? `<a href="${l.product_url}" target="_blank" class="pt-btn">Köp →</a>`
              : `<span class="pt-btn out">Ej i lager</span>`
            }
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  async function loadRelated(plant) {
    try {
      const r = await fetch(`${API}/plants?plant_type=${plant.plant_type}&limit=20`);
      const d = await r.json();
      const others = (d.plants || []).filter(p => p.slug !== plant.slug).slice(0,6);
      if (!others.length) { document.getElementById('relatedGrid').innerHTML = '<div style="color:var(--warm-gray);font-size:0.85rem">Inga liknande växter hittades.</div>'; return; }
      document.getElementById('relatedGrid').innerHTML = others.map((p,i) => `
        <a href="vaxt.html?slug=${p.slug}" class="related-card" style="animation:fadeUp 0.25s ${i*0.04}s ease forwards;opacity:0">
          <div class="rc-img">${typeEmoji[p.plant_type]||'🌿'}</div>
          <div class="rc-body">
            <div class="rc-name">${p.common_name_sv||p.slug}</div>
            <div class="rc-latin">${p.latin_name||''}</div>
          </div>
        </a>
      `).join('');
    } catch(e) {}
  }

  load();
</script>
</body>
</html>
